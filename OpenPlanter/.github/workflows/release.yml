name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: openplanter-desktop

      - name: Install frontend dependencies
        working-directory: openplanter-desktop/frontend
        run: npm ci

      - name: Build frontend
        working-directory: openplanter-desktop/frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: openplanter-desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openplanter-desktop/target/${{ matrix.target }}/release/bundle/**/*.dmg
            openplanter-desktop/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            openplanter-desktop/target/${{ matrix.target }}/release/bundle/**/*.msi
          draft: false
          generate_release_notes: true
