name: Figma Token Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 5 * * *'  # daily at 05:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Write FIGMA_TOKENS_JSON to file
        run: |
          if [ -n "$FIGMA_TOKENS_JSON" ]; then
            echo "$FIGMA_TOKENS_JSON" > figma_tokens.json
          else
            echo '{}' > figma_tokens.json
            echo "⚠️  FIGMA_TOKENS_JSON secret not set, using empty tokens"
          fi
        env:
          FIGMA_TOKENS_JSON: ${{ secrets.FIGMA_TOKENS_JSON }}

      - name: Generate CSS tokens
        run: |
          python3 scripts/figma_token_sync.py --input figma_tokens.json --output dashboard/src/figma-tokens.css

      - name: Commit and push tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/src/figma-tokens.css
          git commit -m "chore(figma): update tokens" || echo "No changes to commit"
          git push origin HEAD:master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
