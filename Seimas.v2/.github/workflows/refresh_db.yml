# Required secrets:
#   DB_DSN              — PostgreSQL connection string (used by refresh_views and openplanter_pipeline)
#   OPENAI_API_KEY      — OpenAI API key for openplanter-agent (openplanter_pipeline only)
name: Refresh DB Stats

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:        # Allow manual trigger

jobs:
  refresh_views:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Refresh Materialized View
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
        run: |
          python -c "
          import psycopg2
          import os
          
          dsn = os.getenv('DB_DSN')
          if not dsn:
              print('Error: DB_DSN secret not set')
              exit(1)
              
          try:
              conn = psycopg2.connect(dsn)
              conn.autocommit = True
              with conn.cursor() as cur:
                  print('Refreshing mp_stats_summary...')
                  cur.execute('REFRESH MATERIALIZED VIEW CONCURRENTLY mp_stats_summary;')
                  print('Done.')
              conn.close()
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "

  openplanter_pipeline:
    needs: refresh_views
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Seimas.v2 Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install scipy scikit-learn networkx rapidfuzz loguru sqlalchemy

      - name: Install PostgreSQL client (for psql in pipeline report)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install OpenPlanter agent
        run: pip install "git+https://github.com/ShinMegamiBoson/OpenPlanter.git"

      - name: Run OpenPlanter Seimas pipeline (headless)
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DB_DSN }}
        run: |
          openplanter-agent \
            --task "$(cat .openplanter/prompts/seimas_pipeline.md)" \
            --workspace . \
            --headless \
            --provider openai
